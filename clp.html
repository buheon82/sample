<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CLP 컨테이너 로딩 플래너</title>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
  :root {
    --bg: #0f1420;
    --panel: #171d2b;
    --panel-2: #1e2637;
    --border: #2a3346;
    --text: #e6e9f0;
    --muted: #8a93a6;
    --accent: #4f8cff;
    --accent-2: #2ecc9a;
    --danger: #ff5c72;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar {
    width: 380px;
    min-width: 380px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 20px;
    gap: 18px;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 4px 0;
  }
  h1 span { color: var(--muted); font-size: 12px; display:block; font-weight: 400; margin-top: 2px;}
  h2 {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0 0 10px 0;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 11px; color: var(--muted); }
  input, select {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 8px;
    font-size: 13px;
    width: 100%;
  }
  input:focus, select:focus { outline: 1px solid var(--accent); }
  button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 13px;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: white; width: 100%; }
  .btn-add { background: var(--panel-2); color: var(--accent-2); border: 1px solid var(--border); width: 100%; }
  .btn-remove {
    background: transparent;
    color: var(--danger);
    padding: 4px 8px;
    font-size: 16px;
    line-height: 1;
  }
  #boxList { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
  .box-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
  }
  .box-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; margin-right: 6px; vertical-align: middle; }
  .stats { display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
  .stat-row { display: flex; justify-content: space-between; padding: 6px 10px; background: var(--panel-2); border-radius: 6px; }
  .stat-row b { color: var(--accent-2); }
  .stat-row.warn b { color: var(--danger); }
  #legend { display: flex; flex-direction: column; gap: 6px; font-size: 12px; max-height: 160px; overflow-y: auto; }
  .legend-item { display: flex; align-items: center; gap: 6px; color: var(--muted); }
  #viewport { flex: 1; position: relative; }
  #canvas-container { width: 100%; height: 100%; }
  #hint {
    position: absolute;
    bottom: 14px;
    left: 14px;
    font-size: 11px;
    color: var(--muted);
    background: rgba(23,29,43,0.8);
    padding: 6px 10px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div>
    <h1>CLP 컨테이너 로딩 플래너<span>Container Loading Planner · 자동 3D 적재</span></h1>
  </div>

  <div>
    <h2>컨테이너 규격 (cm)</h2>
    <div class="row">
      <div class="field">
        <label>Length</label>
        <input type="number" id="contL" value="1203" min="1" />
      </div>
      <div class="field">
        <label>Width</label>
        <input type="number" id="contW" value="235" min="1" />
      </div>
      <div class="field">
        <label>Height</label>
        <input type="number" id="contH" value="239" min="1" />
      </div>
    </div>
    <select id="contPreset">
      <option value="1203,235,239">20ft 표준 컨테이너</option>
      <option value="1203,235,269">20ft 하이큐브</option>
      <option value="1451,235,239">40ft 표준 컨테이너</option>
      <option value="1203,244,269" selected>40ft 하이큐브</option>
      <option value="">직접 입력</option>
    </select>
  </div>

  <div>
    <h2>박스 목록</h2>
    <div id="boxList"></div>
    <button class="btn-add" onclick="addBoxRow()">+ 박스 종류 추가</button>
  </div>

  <button class="btn-primary" onclick="runPacking()">🚚 자동 적재 계산</button>

  <div>
    <h2>적재 결과</h2>
    <div class="stats" id="statsPanel">
      <div class="stat-row"><span>계산 전</span><b>-</b></div>
    </div>
  </div>

  <div>
    <h2>범례</h2>
    <div id="legend"></div>
  </div>
</div>

<div id="viewport">
  <div id="canvas-container"></div>
  <div id="hint">드래그: 회전 · 휠: 확대/축소 · 우클릭 드래그: 이동</div>
</div>

<script>
// ---------- Box row management ----------
let boxRowId = 0;
const palette = ["#4f8cff","#2ecc9a","#ffb347","#ff5c72","#a66bff","#ffd166","#06d6a0","#ef476f","#118ab2","#f78c6b"];

function addBoxRow(name, l, w, h, qty) {
  const id = boxRowId++;
  const color = palette[id % palette.length];
  const div = document.createElement("div");
  div.className = "box-card";
  div.id = "box-" + id;
  div.innerHTML = `
    <div class="box-card-header">
      <span><span class="swatch" style="background:${color}"></span>박스 #${id + 1}</span>
      <button class="btn-remove" onclick="document.getElementById('box-${id}').remove()">✕</button>
    </div>
    <div class="row">
      <div class="field"><label>이름</label><input type="text" class="b-name" value="${name || 'Box' + (id+1)}" /></div>
      <div class="field"><label>수량</label><input type="number" class="b-qty" value="${qty || 20}" min="1" /></div>
    </div>
    <div class="row">
      <div class="field"><label>L</label><input type="number" class="b-l" value="${l || 60}" min="1" /></div>
      <div class="field"><label>W</label><input type="number" class="b-w" value="${w || 40}" min="1" /></div>
      <div class="field"><label>H</label><input type="number" class="b-h" value="${h || 40}" min="1" /></div>
    </div>
  `;
  div.dataset.color = color;
  document.getElementById("boxList").appendChild(div);
}

document.getElementById("contPreset").addEventListener("change", (e) => {
  if (!e.target.value) return;
  const [l, w, h] = e.target.value.split(",").map(Number);
  document.getElementById("contL").value = l;
  document.getElementById("contW").value = w;
  document.getElementById("contH").value = h;
});

// initial rows
addBoxRow("파레트박스A", 100, 100, 100, 12);
addBoxRow("중형박스B", 60, 40, 40, 40);
addBoxRow("소형박스C", 30, 20, 20, 80);

// ---------- 3D Bin Packing (guillotine / free-space split heuristic) ----------
function packContainer(container, boxTypes) {
  // expand box types into individual units
  let units = [];
  boxTypes.forEach((bt, typeIdx) => {
    for (let i = 0; i < bt.qty; i++) {
      units.push({ typeIdx, l: bt.l, w: bt.w, h: bt.h, vol: bt.l * bt.w * bt.h });
    }
  });
  // largest volume first
  units.sort((a, b) => b.vol - a.vol);

  let freeSpaces = [{ x: 0, y: 0, z: 0, l: container.l, w: container.w, h: container.h }];
  const placed = [];
  const unplaced = [];

  const orientations = (l, w, h) => ([
    [l, w, h], [w, l, h], [l, h, w], [h, l, w], [w, h, l], [h, w, l]
  ]);

  for (const unit of units) {
    let bestSpaceIdx = -1;
    let bestDims = null;
    let bestScore = Infinity;

    for (let si = 0; si < freeSpaces.length; si++) {
      const s = freeSpaces[si];
      for (const [dl, dw, dh] of orientations(unit.l, unit.w, unit.h)) {
        if (dl <= s.l && dw <= s.w && dh <= s.h) {
          // prefer space closest in volume (least waste), then lowest z then lowest y then lowest x
          const waste = s.l * s.w * s.h - dl * dw * dh;
          const score = waste + s.z * 1e6 + s.y * 1e3 + s.x;
          if (score < bestScore) {
            bestScore = score;
            bestSpaceIdx = si;
            bestDims = [dl, dw, dh];
          }
        }
      }
    }

    if (bestSpaceIdx === -1) {
      unplaced.push(unit);
      continue;
    }

    const s = freeSpaces[bestSpaceIdx];
    const [dl, dw, dh] = bestDims;
    placed.push({
      typeIdx: unit.typeIdx,
      x: s.x, y: s.y, z: s.z,
      l: dl, w: dw, h: dh
    });

    // remove used space, split remaining into up to 3 guillotine sub-spaces
    freeSpaces.splice(bestSpaceIdx, 1);
    const newSpaces = [
      { x: s.x + dl, y: s.y, z: s.z, l: s.l - dl, w: s.w, h: s.h },       // remainder along X
      { x: s.x, y: s.y + dw, z: s.z, l: dl, w: s.w - dw, h: s.h },        // remainder along Y (within used X)
      { x: s.x, y: s.y, z: s.z + dh, l: dl, w: dw, h: s.h - dh }          // remainder along Z (within used X,Y)
    ].filter(ns => ns.l > 0 && ns.w > 0 && ns.h > 0);

    freeSpaces.push(...newSpaces);
  }

  return { placed, unplaced, totalUnits: units.length };
}

// ---------- Three.js scene ----------
let scene, camera, renderer, controls;
let boxGroup;

function initScene() {
  const container = document.getElementById("canvas-container");
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0f1420);

  camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 1, 5000);
  camera.position.set(900, 600, 900);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 0.65));
  const dir = new THREE.DirectionalLight(0xffffff, 0.7);
  dir.position.set(500, 800, 400);
  scene.add(dir);
  const dir2 = new THREE.DirectionalLight(0xffffff, 0.3);
  dir2.position.set(-500, 300, -400);
  scene.add(dir2);

  boxGroup = new THREE.Group();
  scene.add(boxGroup);

  window.addEventListener("resize", () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });

  animate();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

function clearScene() {
  while (boxGroup.children.length) boxGroup.remove(boxGroup.children[0]);
}

function renderContainer(l, w, h) {
  const geo = new THREE.BoxGeometry(l, h, w);
  const edges = new THREE.EdgesGeometry(geo);
  const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x4f8cff, linewidth: 2 }));
  line.position.set(0, h / 2, 0);
  boxGroup.add(line);

  // floor grid
  const grid = new THREE.GridHelper(Math.max(l, w) * 1.2, 20, 0x2a3346, 0x1e2637);
  boxGroup.add(grid);
}

function renderBoxes(placed, boxTypes, containerL, containerW) {
  placed.forEach(p => {
    const color = boxTypes[p.typeIdx].color;
    const geo = new THREE.BoxGeometry(p.l * 0.98, p.h * 0.98, p.w * 0.98);
    const mat = new THREE.MeshLambertMaterial({ color: new THREE.Color(color) });
    const mesh = new THREE.Mesh(geo, mat);
    // convert CLP coords (x: length, y: width, z: height) to three.js (x, y=height, z=width)
    // center container at origin: shift by -containerL/2, -containerW/2
    mesh.position.set(
      p.x + p.l / 2 - containerL / 2,
      p.z + p.h / 2,
      p.y + p.w / 2 - containerW / 2
    );
    const edges = new THREE.EdgesGeometry(geo);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25 }));
    mesh.add(line);
    boxGroup.add(mesh);
  });
}

function fitCameraToContainer(l, w, h) {
  const dist = Math.max(l, w, h) * 1.6;
  camera.position.set(dist * 0.7, dist * 0.55, dist * 0.7);
  controls.target.set(0, h / 4, 0);
  controls.update();
}

// ---------- Run ----------
function runPacking() {
  const contL = Number(document.getElementById("contL").value);
  const contW = Number(document.getElementById("contW").value);
  const contH = Number(document.getElementById("contH").value);

  const boxTypes = [];
  document.querySelectorAll(".box-card").forEach(card => {
    boxTypes.push({
      name: card.querySelector(".b-name").value,
      l: Number(card.querySelector(".b-l").value),
      w: Number(card.querySelector(".b-w").value),
      h: Number(card.querySelector(".b-h").value),
      qty: Number(card.querySelector(".b-qty").value),
      color: card.dataset.color
    });
  });

  if (boxTypes.length === 0) {
    alert("박스를 하나 이상 추가해주세요.");
    return;
  }

  const result = packContainer({ l: contL, w: contW, h: contH }, boxTypes);

  clearScene();
  renderContainer(contL, contW, contH);
  renderBoxes(result.placed, boxTypes, contL, contW);
  fitCameraToContainer(contL, contW, contH);

  updateStats(result, boxTypes, contL, contW, contH);
  updateLegend(boxTypes, result);
}

function updateStats(result, boxTypes, contL, contW, contH) {
  const containerVol = contL * contW * contH;
  const usedVol = result.placed.reduce((sum, p) => sum + p.l * p.w * p.h, 0);
  const utilization = ((usedVol / containerVol) * 100).toFixed(1);
  const placedCount = result.placed.length;
  const unplacedCount = result.unplaced.length;

  const panel = document.getElementById("statsPanel");
  panel.innerHTML = `
    <div class="stat-row"><span>총 요청 박스</span><b>${result.totalUnits} 개</b></div>
    <div class="stat-row"><span>적재 완료</span><b>${placedCount} 개</b></div>
    <div class="stat-row ${unplacedCount > 0 ? 'warn' : ''}"><span>미적재</span><b>${unplacedCount} 개</b></div>
    <div class="stat-row"><span>부피 적재율</span><b>${utilization}%</b></div>
    <div class="stat-row"><span>컨테이너 부피</span><b>${(containerVol / 1e6).toFixed(2)} m³</b></div>
  `;
}

function updateLegend(boxTypes, result) {
  const counts = {};
  result.placed.forEach(p => { counts[p.typeIdx] = (counts[p.typeIdx] || 0) + 1; });
  const legend = document.getElementById("legend");
  legend.innerHTML = boxTypes.map((bt, i) => `
    <div class="legend-item">
      <span class="swatch" style="background:${bt.color}"></span>
      ${bt.name} — ${counts[i] || 0} / ${bt.qty} 적재 (${bt.l}×${bt.w}×${bt.h}cm)
    </div>
  `).join("");
}

initScene();
runPacking();
</script>
</body>
</html>
